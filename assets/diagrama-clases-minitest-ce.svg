<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1452 1050" role="img" aria-labelledby="title desc">
  <title id="title">Diagrama de clases - MiniTest CE</title>
  <desc id="desc">Diagrama UML de una aplicacion Java Web con records, repositorio, servicio y servlets.</desc>
  <defs>
    <style>
      .title { fill: #0e2a4d; font: 700 52px Arial, sans-serif; }
      .subtitle { fill: #333; font: italic 32px Arial, sans-serif; }
      .box { stroke: #121826; stroke-width: 2.4; rx: 8; }
      .green { fill: #eef8ed; }
      .blue { fill: #eaf4ff; }
      .yellow { fill: #fff7d7; }
      .violet { fill: #f2eafa; }
      .head { fill-opacity: 0.55; }
      .label { fill: #111827; font: 700 24px Arial, sans-serif; }
      .small-label { fill: #111827; font: 700 19px Arial, sans-serif; }
      .stereo { fill: #111827; font: 20px Arial, sans-serif; }
      .italic { fill: #111827; font: italic 19px Arial, sans-serif; }
      .member { fill: #111827; font: 18px Arial, sans-serif; }
      .tiny { fill: #111827; font: 17px Arial, sans-serif; }
      .line { stroke: #111827; stroke-width: 2.2; fill: none; }
      .dash { stroke-dasharray: 10 8; }
      .thin { stroke-width: 1.8; }
      .caption { fill: #111827; font: 17px Arial, sans-serif; }
    </style>
    <marker id="arrow" markerHeight="10" markerWidth="10" orient="auto" refX="8" refY="5">
      <path d="M0,0 L10,5 L0,10 Z" fill="#111827"/>
    </marker>
    <marker id="triangle" markerHeight="16" markerWidth="16" orient="auto" refX="14" refY="8">
      <path d="M0,0 L16,8 L0,16 Z" fill="#fff" stroke="#111827" stroke-width="1.8"/>
    </marker>
    <marker id="diamond" markerHeight="16" markerWidth="18" orient="auto" refX="2" refY="8">
      <path d="M2,8 L9,2 L16,8 L9,14 Z" fill="#fff" stroke="#111827" stroke-width="1.8"/>
    </marker>
    <marker id="composition" markerHeight="16" markerWidth="18" orient="auto" refX="2" refY="8">
      <path d="M2,8 L9,2 L16,8 L9,14 Z" fill="#111827" stroke="#111827" stroke-width="1.8"/>
    </marker>
  </defs>

  <rect width="1452" height="1050" fill="#fffdf8"/>
  <text class="title" x="326" y="58">Diagrama de clases - MiniTest CE</text>
  <text class="subtitle" x="455" y="104">App web Java con records y servlets</text>

  <!-- Records del modelo -->
  <g transform="translate(52 132)">
    <rect class="box green" width="324" height="278"/>
    <rect class="box green head" width="324" height="74"/>
    <line class="line thin" x1="0" x2="324" y1="74" y2="74"/>
    <line class="line thin" x1="0" x2="324" y1="182" y2="182"/>
    <text class="stereo" x="108" y="31">&lt;&lt;record&gt;&gt;</text>
    <text class="label" x="122" y="58">Pregunta</text>
    <text class="member" x="16" y="104">- enunciado: String</text>
    <text class="member" x="16" y="134">- opciones: List&lt;String&gt;</text>
    <text class="member" x="16" y="164">- indiceRespuestaCorrecta: int</text>
    <text class="member" x="16" y="212">+ Pregunta(enunciado: String,</text>
    <text class="member" x="36" y="240">opciones: List&lt;String&gt;,</text>
    <text class="member" x="36" y="268">indiceRespuestaCorrecta: int)</text>
  </g>

  <g transform="translate(52 494)">
    <rect class="box green" width="324" height="228"/>
    <rect class="box green head" width="324" height="66"/>
    <line class="line thin" x1="0" x2="324" y1="66" y2="66"/>
    <line class="line thin" x1="0" x2="324" y1="160" y2="160"/>
    <text class="stereo" x="108" y="31">&lt;&lt;record&gt;&gt;</text>
    <text class="label" x="140" y="58">Test</text>
    <text class="member" x="16" y="92">- id: int</text>
    <text class="member" x="16" y="120">- titulo: String</text>
    <text class="member" x="16" y="148">- preguntas: List&lt;Pregunta&gt;</text>
    <text class="member" x="16" y="178">+ Test(id: int, titulo: String,</text>
    <text class="member" x="36" y="206">preguntas: List&lt;Pregunta&gt;)</text>
  </g>

  <g transform="translate(52 760)">
    <rect class="box green" width="348" height="258"/>
    <rect class="box green head" width="348" height="62"/>
    <line class="line thin" x1="0" x2="348" y1="62" y2="62"/>
    <line class="line thin" x1="0" x2="348" y1="212" y2="212"/>
    <text class="stereo" x="120" y="29">&lt;&lt;record&gt;&gt;</text>
    <text class="label" x="72" y="56">ResultadoCorreccion</text>
    <text class="member" x="16" y="88">- idTest: int</text>
    <text class="member" x="16" y="116">- totalPreguntas: int</text>
    <text class="member" x="16" y="144">- aciertos: int</text>
    <text class="member" x="16" y="172">- errores: int</text>
    <text class="member" x="16" y="200">- nota: double</text>
    <text class="member" x="16" y="230">+ ResultadoCorreccion(...)</text>
  </g>

  <!-- Repositorio y servicio -->
  <g transform="translate(520 198)">
    <rect class="box blue" width="350" height="224"/>
    <rect class="box blue head" width="350" height="56"/>
    <line class="line thin" x1="0" x2="350" y1="56" y2="56"/>
    <line class="line thin" x1="0" x2="350" y1="116" y2="116"/>
    <text class="label" x="98" y="39">TestRepository</text>
    <text class="member" x="18" y="92">- tests: List&lt;Test&gt;</text>
    <text class="member" x="18" y="154">+ obtenerTodos(): List&lt;Test&gt;</text>
    <text class="member" x="18" y="188">+ obtenerPorId(id: int): Optional&lt;Test&gt;</text>
  </g>

  <g transform="translate(496 532)">
    <rect class="box blue" width="366" height="278"/>
    <rect class="box blue head" width="366" height="56"/>
    <line class="line thin" x1="0" x2="366" y1="56" y2="56"/>
    <line class="line thin" x1="0" x2="366" y1="116" y2="116"/>
    <text class="label" x="118" y="39">TestService</text>
    <text class="member" x="18" y="92">- repository: TestRepository</text>
    <text class="member" x="18" y="154">+ obtenerTodosLosTests(): List&lt;Test&gt;</text>
    <text class="member" x="18" y="188">+ obtenerTestPorId(id: int): Optional&lt;Test&gt;</text>
    <text class="member" x="18" y="222">+ corregirTest(idTest: int,</text>
    <text class="member" x="40" y="250">respuestasUsuario: List&lt;Integer&gt;):</text>
    <text class="member" x="40" y="274">ResultadoCorreccion</text>
  </g>

  <!-- Servlets -->
  <g transform="translate(1095 106)">
    <rect class="box violet" width="238" height="70"/>
    <text class="label" x="54" y="45">HttpServlet</text>
  </g>

  <g transform="translate(986 294)">
    <rect class="box yellow" width="350" height="228"/>
    <rect class="box yellow head" width="350" height="118"/>
    <line class="line thin" x1="0" x2="350" y1="118" y2="118"/>
    <line class="line thin" x1="0" x2="350" y1="182" y2="182"/>
    <text class="stereo" x="126" y="34">&lt;&lt;Servlet&gt;&gt;</text>
    <text class="small-label" x="18" y="66">ObtenerTodosLosTestsServlet</text>
    <text class="italic" x="118" y="98">extends HttpServlet</text>
    <text class="member" x="18" y="150">+ doGet(req: HttpServletRequest,</text>
    <text class="member" x="42" y="176">resp: HttpServletResponse): void</text>
    <text class="member" x="18" y="214">GET /tests</text>
  </g>

  <g transform="translate(986 550)">
    <rect class="box yellow" width="350" height="222"/>
    <rect class="box yellow head" width="350" height="116"/>
    <line class="line thin" x1="0" x2="350" y1="116" y2="116"/>
    <line class="line thin" x1="0" x2="350" y1="178" y2="178"/>
    <text class="stereo" x="126" y="34">&lt;&lt;Servlet&gt;&gt;</text>
    <text class="label" x="68" y="66">ObtenerTestServlet</text>
    <text class="italic" x="118" y="96">extends HttpServlet</text>
    <text class="member" x="18" y="148">+ doGet(req: HttpServletRequest,</text>
    <text class="member" x="42" y="174">resp: HttpServletResponse): void</text>
    <text class="member" x="18" y="210">GET /tests/{id}</text>
  </g>

  <g transform="translate(986 800)">
    <rect class="box yellow" width="350" height="218"/>
    <rect class="box yellow head" width="350" height="112"/>
    <line class="line thin" x1="0" x2="350" y1="112" y2="112"/>
    <line class="line thin" x1="0" x2="350" y1="176" y2="176"/>
    <text class="stereo" x="126" y="34">&lt;&lt;Servlet&gt;&gt;</text>
    <text class="label" x="74" y="66">CorregirTestServlet</text>
    <text class="italic" x="118" y="96">extends HttpServlet</text>
    <text class="member" x="18" y="144">+ doPost(req: HttpServletRequest,</text>
    <text class="member" x="42" y="170">resp: HttpServletResponse): void</text>
    <text class="member" x="18" y="206">POST /tests/corregir</text>
  </g>

  <!-- Relaciones del modelo -->
  <path class="line" d="M112 494 L112 452 L112 410" marker-start="url(#composition)"/>
  <text class="caption" x="130" y="460">contiene</text>
  <text class="caption" x="88" y="432">*</text>
  <text class="caption" x="88" y="486">1</text>

  <path class="line" d="M376 560 L444 560 L444 254 L520 254" marker-end="url(#diamond)"/>
  <text class="caption" x="418" y="352">1</text>
  <text class="caption" x="388" y="552">*</text>
  <text class="caption" x="410" y="384">almacena</text>

  <!-- Dependencias -->
  <line class="line dash" x1="678" y1="532" x2="678" y2="422" marker-end="url(#arrow)"/>
  <line class="line dash" x1="496" y1="722" x2="376" y2="722" marker-end="url(#arrow)"/>
  <line class="line dash" x1="496" y1="822" x2="400" y2="822" marker-end="url(#arrow)"/>
  <line class="line dash" x1="986" y1="398" x2="870" y2="398" marker-end="url(#arrow)"/>
  <line class="line dash" x1="986" y1="648" x2="862" y2="648" marker-end="url(#arrow)"/>
  <line class="line dash" x1="986" y1="892" x2="862" y2="892" marker-end="url(#arrow)"/>

  <!-- Herencia de servlets -->
  <path class="line" d="M1214 294 L1214 176" marker-end="url(#triangle)"/>
  <path class="line" d="M1336 408 L1394 408 L1394 252 L1214 252 L1214 176" marker-end="url(#triangle)"/>
  <path class="line" d="M1336 658 L1394 658 L1394 252" marker-end="url(#triangle)"/>
  <path class="line" d="M1336 908 L1394 908 L1394 252" marker-end="url(#triangle)"/>
</svg>
